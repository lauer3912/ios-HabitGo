name: HabitArcFlow
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9L6N2ZF26B
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  HabitArcFlow:
    type: application
    platform: iOS
    sources:
      - path: HabitGo
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: HabitGo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.HabitGo
        PRODUCT_NAME: HabitArcFlow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: HabitGo/HabitGo.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: 9L6N2ZF26B
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES
    entitlements:
      path: HabitGo/HabitGo.entitlements
    dependencies:
      - target: HabitArcFlowWidget
        embed: true

  HabitArcFlowWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HabitGoWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: HabitGoWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.HabitGo.widget
        PRODUCT_NAME: HabitArcFlowWidget
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: HabitGoWidget/HabitGoWidget.entitlements
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES
    entitlements:
      path: HabitGoWidget/HabitGoWidget.entitlements

  HabitArcFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HabitGoTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: HabitArcFlow
    settings:
      base:
        INFOPLIST_FILE: HabitGoTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.HabitGoTests
        PRODUCT_NAME: HabitArcFlowTests
        GENERATE_INFOPLIST_FILE: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HabitArcFlow.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HabitArcFlow"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B

  HabitArcFlowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HabitGoUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: HabitArcFlow
    settings:
      base:
        INFOPLIST_FILE: HabitGoUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.HabitGoUITests
        PRODUCT_NAME: HabitArcFlowUITests
        GENERATE_INFOPLIST_FILE: NO
        TEST_TARGET: "$(BUILT_PRODUCTS_DIR)/HabitArcFlow.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HabitArcFlow"
        CODE_SIGN_ENTITLEMENTS: ""
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B

schemes:
  HabitArcFlow:
    build:
      targets:
        HabitArcFlow: all
        HabitArcFlowWidget: all
        HabitArcFlowUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HabitArcFlowUITests
    archive:
      config: Release
