name: HabitGo
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: NO
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  HabitGo:
    type: application
    platform: iOS
    sources:
      - path: HabitGo
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: HabitGo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.HabitGo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: HabitGo/HabitGo.entitlements
    entitlements:
      path: HabitGo/HabitGo.entitlements
    dependencies:
      - target: HabitGoWidget
        embed: true

  HabitGoWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HabitGoWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: HabitGoWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.HabitGo.widget
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: HabitGoWidget/HabitGoWidget.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
    entitlements:
      path: HabitGoWidget/HabitGoWidget.entitlements

  HabitGoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HabitGoTests
    dependencies:
      - target: HabitGo
    settings:
      base:
        INFOPLIST_FILE: HabitGoTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.HabitGoTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HabitGo.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HabitGo"
        BUNDLE_LOADER: "$(TEST_HOST)"

  HabitGoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HabitGoUITests
    dependencies:
      - target: HabitGo
    settings:
      base:
        INFOPLIST_FILE: HabitGoUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.HabitGoUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET: "$(BUILT_PRODUCTS_DIR)/HabitGo.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HabitGo"
        CODE_SIGN_ENTITLEMENTS: ""
        DEVELOPMENT_TEAM: ""

schemes:
  HabitGo:
    build:
      targets:
        HabitGo: all
        HabitGoWidget: all
        HabitGoUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HabitGoUITests
    archive:
      config: Release
